function sel(props,...children){return e("select",props,...children);}
function opt(val,lbl){return e("option",{key:val,value:val},lbl||val);}
function ta(props){return e("textarea",props);}
function lbl(props,...children){return e("label",props,...children);}

function Inp({label:l,value,onChange,placeholder,type="text",required,mb=16}){
  return div({style:{marginBottom:mb}},[
    l&&e("label",{key:"l",style:S.label},l,required&&span({key:"r",style:{color:"#FF4D6D",marginLeft:3}},"*")),
    inp({key:"i",className:"cb-input",style:S.inp,type,value:value||"",onChange:ev=>onChange(ev.target.value),placeholder:placeholder||""}),
  ]);
}
function Sel({label:l,value,onChange,options,required,mb=16}){
  return div({style:{marginBottom:mb}},[
    l&&e("label",{key:"l",style:S.label},l,required&&span({key:"r",style:{color:"#FF4D6D",marginLeft:3}},"*")),
    e("select",{key:"s",className:"cb-sel",style:S.sel,value:value||"",onChange:ev=>onChange(ev.target.value)},[
      e("option",{key:"__",value:""},"Select..."),
      ...(options||[]).map(o=>typeof o==="string"?e("option",{key:o,value:o},o):e("option",{key:o.value||o.id,value:o.value||o.id},o.label||o.name)),

function Ta({label:l,value,onChange,placeholder,rows=3,mb=16}){

function OK({children}){return div({style:S.ok},"✅ ",children);}

function LoginScreen({onLogin}){

    const c=DEMO_CLINICS.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.password===pw);
    if(c){const prac=DEMO_PRACTITIONERS[c.id]||[];const ex=await sget("practitioners:"+c.id);if(!ex)await sset("practitioners:"+c.id,prac);onLogin(c);}

  useEffect(()=>{sget("practitioners:"+clinic.id).then(p=>setList(p||[]));},[clinic.id]);

    if(!f.name||!f.profession)return;
    const up=[...list,{...f,id:"p"+Date.now()}];

const NO_DIAG_PROFS=["Occupational Therapist","Exercise Physiologist"];
const NO_MED_PROFS=["Physiotherapist","Osteopath","Chiropractor","Podiatrist","Occupational Therapist","Exercise Physiologist","Psychologist"];

function ClaimForm({clinic,claimData,onSave,onBack}){
  const ALL_TABS=["Patient & Claim","Diagnosis","Imaging","Treatment Plan","Certificate of Capacity","Allied Health Forms","RTW & Rehab Plan","Referral & Export"];
  const[tab,setTab]=useState(0);
  const[claim,setClaim]=useState(claimData||{id:"claim_"+Date.now(),scheme:"WorkCover",status:"Active",createdAt:new Date().toISOString(),clinicId:clinic.id});
  const prof=claim.practitionerProfession||"";
  const TABS=ALL_TABS.filter(t=>{
    if(t==="Diagnosis"&&NO_DIAG_PROFS.includes(prof))return false;
    return true;
  });
  const[practitioners,setPractitioners]=useState([]);
  const[savedModal,setSavedModal]=useState(false);
  const[draftModal,setDraftModal]=useState(false);
  useEffect(()=>{sget("practitioners:"+clinic.id).then(p=>setPractitioners(p||[]));},[clinic.id]);
  const up=(field,value)=>setClaim(prev=>({...prev,[field]:value}));
  const save=async()=>{
    const now=new Date().toISOString();
    const prac=practitioners.find(p=>p.id===claim.practitionerId);
    const updated={...claim,lastEditedAt:now,lastEditedBy:prac?prac.name:clinic.name,createdAt:claim.createdAt||now,createdBy:claim.createdBy||(prac?prac.name:clinic.name)};
    setClaim(updated);await onSave(updated);setSavedModal(true);
  };
  const saveDraft=async()=>{
    const now=new Date().toISOString();
    const prac=practitioners.find(p=>p.id===claim.practitionerId);
    const updated={...claim,status:"Draft",lastEditedAt:now,lastEditedBy:prac?prac.name:clinic.name,createdAt:claim.createdAt||now,createdBy:claim.createdBy||(prac?prac.name:clinic.name)};
    setClaim(updated);await onSave(updated);setDraftModal(true);
  };
  return div({style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
    savedModal&&e(Modal,{key:"sm",msg:"Claim saved successfully!",onClose:()=>setSavedModal(false)}),
    draftModal&&e(Modal,{key:"dm",msg:"Draft saved! Continue from Claims list.",onClose:()=>{setDraftModal(false);onBack();},onConfirm:()=>{setDraftModal(false);onBack();}}),
    div({key:"hdr",style:{...S.fb,marginBottom:22}},[
      div({key:"l",style:S.fr},[
        btn({key:"back",style:S.btnS,onClick:onBack},"<- Back"),
        div({key:"t",style:{fontWeight:700,fontSize:"0.95rem"}},claim.patientName||"New Claim"),
      ]),
      div({key:"r",style:{display:"flex",gap:10}},[
        btn({key:"draft",style:S.btnS,onClick:saveDraft},"Save draft"),
        btn({key:"save",style:S.btnP,onClick:save},"Save claim"),
      ]),
    ]),
    div({key:"tabs",style:{display:"flex",gap:4,borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:28,flexWrap:"wrap"}},
      TABS.map((t,i)=>btn({key:t,className:"tab-btn",onClick:()=>{setTab(i);window.scrollTo(0,0);},style:{padding:"10px 16px",borderRadius:"8px 8px 0 0",border:"none",background:tab===i?"rgba(0,201,167,0.1)":"transparent",color:tab===i?"#00C9A7":"rgba(255,255,255,0.45)",fontSize:"0.82rem",fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",borderBottom:tab===i?"2px solid #00C9A7":"none"}},(i+1)+". "+t))
    ),
    tab===0&&e(Tab1,{key:"t0",claim,up,practitioners}),
    tab===1&&e(Tab2,{key:"t1",claim,up}),
    tab===2&&e(Tab3,{key:"t2",claim,up}),
    tab===3&&e(Tab4,{key:"t3",claim,up}),
    tab===4&&e(Tab5,{key:"t4",claim,up,clinic,practitioners}),

// ── OUTCOME MEASURES CHART ────────────────────────────────────────────────────
function OutcomeTrendChart({scores,measure,measureKey}){
  if(!scores||scores.length<1)return null;
  const W=500,H=180,PAD={top:20,right:20,bottom:40,left:50};

  const sorted=[...scores].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const vals=sorted.map(s=>parseFloat(s.score));
  const minV=m.min,maxV=m.max;
  const toX=i=>(PAD.left+i*(iW/Math.max(sorted.length-1,1)));
  const toY=v=>PAD.top+iH-(((v-minV)/(maxV-minV))*iH);
  const pts=sorted.map((s,i)=>({x:toX(i),y:toY(parseFloat(s.score)),score:s.score,date:s.date}));
  const path=pts.map((p,i)=>(i===0?"M":"L")+p.x+","+p.y).join(" ");

      pts.length>1&&e("path",{key:"path",d:path,fill:"none",stroke:lineColor,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"}),
      ...pts.map((p,i)=>e("circle",{key:"dot"+i,cx:p.x,cy:p.y,r:hov===i?6:4,fill:lineColor,stroke:"#0C1A2E",strokeWidth:2,style:{cursor:"pointer"},onMouseEnter:()=>setHov(i),onMouseLeave:()=>setHov(null)})),
      ...sorted.map((s,i)=>{

      }),

// ── OUTCOME MEASURES TAB ──────────────────────────────────────────────────────
function OutcomeMeasuresTab({claim,up}){
  const[selMeasure,setSelMeasure]=useState("");
  const[scoreVal,setScoreVal]=useState("");
  const[scoreDate,setScoreDate]=useState(new Date().toISOString().split("T")[0]);
  const[scoreNotes,setScoreNotes]=useState("");
  const allScores=claim.outcomeScores||{};
  const addScore=()=>{
    if(!selMeasure||!scoreVal||!scoreDate)return;
    const m=OUTCOME_MEASURES[selMeasure];if(!m)return;
    const val=parseFloat(scoreVal);
    if(isNaN(val)||val<m.min||val>m.max){alert("Score must be between "+m.min+" and "+m.max);return;}
    const existing=allScores[selMeasure]||[];
    const updated={...allScores,[selMeasure]:[...existing,{score:scoreVal,date:scoreDate,notes:scoreNotes,id:"sc_"+Date.now()}]};
    up("outcomeScores",updated);
    setScoreVal("");setScoreNotes("");
  };
  const remScore=(measure,id)=>{
    const updated={...allScores,[measure]:(allScores[measure]||[]).filter(s=>s.id!==id)};
    if(updated[measure].length===0)delete updated[measure];
    up("outcomeScores",updated);
  };
  const activeMeasures=Object.keys(allScores).filter(k=>allScores[k]&&allScores[k].length>0);
  const getLatest=key=>{const s=allScores[key];if(!s||s.length===0)return null;return [...s].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];};
  const getTrend=key=>{const s=allScores[key];if(!s||s.length<2)return null;const sorted=[...s].sort((a,b)=>new Date(a.date)-new Date(b.date));const m=OUTCOME_MEASURES[key];const first=parseFloat(sorted[0].score),last=parseFloat(sorted[sorted.length-1].score);if(m.higherBetter)return last>first?"improving":last<first?"declining":"stable";return last<first?"improving":last>first?"declining":"stable";};
  return div({},[
    div({key:"h",style:{fontWeight:700,marginBottom:6}},"Functional Outcome Measures"),
    div({key:"s",style:{fontSize:"0.82rem",color:"#5B7A99",marginBottom:20}},"Track scores over time. Latest scores auto-populate into the Certificate of Capacity."),
    activeMeasures.length>0&&div({key:"summary",style:{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}},
      activeMeasures.map(key=>{
        const latest=getLatest(key);const trend=getTrend(key);const m=OUTCOME_MEASURES[key];
        const trendColor=trend==="improving"?"#00C9A7":trend==="declining"?"#FF4D6D":"#FFB830";
        return div({key,style:{...S.cardSm,minWidth:140,flex:"1 0 140px"}},[
          div({key:"n",style:{fontSize:"0.72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",color:"#5B7A99",marginBottom:4}},key),
          div({key:"s",style:{fontWeight:800,fontSize:"1.4rem",color:"#EFF6FF",lineHeight:1}},latest.score+m.unit),
          div({key:"d",style:{fontSize:"0.72rem",color:"#5B7A99",marginTop:2}},new Date(latest.date).toLocaleDateString("en-AU")),
          trend&&span({key:"t",style:{fontSize:"0.7rem",color:trendColor,fontWeight:600}},trend==="improving"?"↑ Improving":trend==="declining"?"↓ Declining":"→ Stable"),
        ]);
      })
    ),
    div({key:"add",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Add score"),
      div({key:"g",style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}},[

// Outcome measures table (matches official AHRMP format)
function wsOMTable(claim){
  const allScores=claim.outcomeScores||{};
  const keys=Object.keys(allScores);
  if(keys.length===0)return div({style:{fontSize:10,color:"#999",fontStyle:"italic",padding:"4px 0"}},"No outcome measures recorded");
  return e("table",{style:wsTbl},[
    e("thead",{key:"hd"},e("tr",null,[
      e("th",{key:"m",style:{...wsTh,width:"30%"}},"Outcome Measure"),
      e("th",{key:"id",style:{...wsTh,width:"15%"}},"Initial Date"),
      e("th",{key:"is",style:{key:"is",...wsTh,width:"12%"}},"Initial Score"),
      e("th",{key:"rd",style:{...wsTh,width:"15%"}},"Review Date"),
      e("th",{key:"rs",style:{...wsTh,width:"12%"}},"Review Score"),
      e("th",{key:"n",style:{...wsTh,width:"16%"}},"Notes"),
    ])),
    e("tbody",{key:"bd"},keys.map(key=>{
      const scores=[...(allScores[key]||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const m=OUTCOME_MEASURES[key];
      const first=scores[0]||{};
      const last=scores.length>1?scores[scores.length-1]:{};
      const unit=m?m.unit:"";
      return e("tr",{key},[
        e("td",{key:"m",style:{...wsTd,fontWeight:600}},key),
        e("td",{key:"id",style:wsTd},first.date?new Date(first.date).toLocaleDateString("en-AU"):""),
        e("td",{key:"is",style:{...wsTd,textAlign:"center"}},first.score?(first.score+unit):""),
        e("td",{key:"rd",style:wsTd},last.date&&last.date!==first.date?new Date(last.date).toLocaleDateString("en-AU"):""),
        e("td",{key:"rs",style:{...wsTd,textAlign:"center"}},last.score&&last.score!==first.score?(last.score+unit):""),
        e("td",{key:"n",style:wsTd},first.notes||""),
      ]);
    })),
  ]);
}

// ── TAB 7: RTW & REHAB PLAN (EVIDENCE-BASED ENGINE) ──────────────────────────

  const totalFlatAdj=adjustments.filter(a=>a.category==="flat").reduce((acc,a)=>acc+a.flat,0);
  const calcRTW=(label)=>{
    const db=RTW_DB[label];
    if(!db)return null;
    const baseModMin=db.mod[0],baseModMax=db.mod[1];
    const baseNormMin=db.normal[0],baseNormMax=db.normal[1];
    const adjModMin=Math.round(baseModMin*(1+totalMultAdj)+totalFlatAdj/2);
    const adjModMax=Math.round(baseModMax*(1+totalMultAdj)+totalFlatAdj/2);
    const adjNormMin=Math.round(baseNormMin*(1+totalMultAdj)+totalFlatAdj);
    const adjNormMax=Math.round(baseNormMax*(1+totalMultAdj)+totalFlatAdj);
    return{baseModMin,baseModMax,baseNormMin,baseNormMax,adjModMin,adjModMax,adjNormMin,adjNormMax,notes:db.notes};
  };

// ── TAB 8: REFERRAL & EXPORT ────────────────────────────────────────────────
function Tab8({claim,up,clinic,practitioners}){
  const[tmpl,setTmpl]=useState("");
  const[letter,setLetter]=useState("");
  const[gen,setGen]=useState(false);
  const[errors,setErrors]=useState([]);
  const TMPLS=[
    {id:"specialist_opinion",label:"Specialist referral - Opinion"},
    {id:"specialist_ongoing",label:"Specialist referral - Ongoing management"},
    {id:"allied_health",label:"Allied health referral"},
    {id:"psychology",label:"Psychology referral"},
    {id:"gym_swim",label:"Gym / Swim referral"},
    {id:"radiology",label:"Radiological imaging referral"},
    {id:"household",label:"Household / ADL assessment"},
    {id:"travel",label:"Travel & accommodation request"},
    {id:"procedure",label:"Procedure / Surgery request"},
  ];
  const refs=claim.referrals||[];
  const prac=practitioners.find(p=>p.id===claim.practitionerId);
  const diags=(claim.diagnoses||[]).map(d=>d.label).join(", ")||"Not specified";
  const firstRef=refs[0]||{};

  const validate=()=>{
    const errs=[];
    if(!(claim.patientFirstName||claim.patientName))errs.push({field:"Patient name",tab:0,hint:"Add in Patient & Claim tab"});
    if(!claim.dob)errs.push({field:"Date of birth",tab:0,hint:"Add in Patient & Claim tab"});
    if(!claim.claimNumber)errs.push({field:"Claim number",tab:0,hint:"Add in Patient & Claim tab"});
    if(!claim.dateOfInjury)errs.push({field:"Date of injury",tab:0,hint:"Add in Patient & Claim tab"});
    if(!claim.practitionerId)errs.push({field:"Practitioner",tab:0,hint:"Select in Patient & Claim tab"});
    if(!(claim.diagnoses&&claim.diagnoses.length>0))errs.push({field:"At least one diagnosis",tab:1,hint:"Add in Diagnosis tab"});
    if(!claim.insurerId)errs.push({field:"Insurer",tab:0,hint:"Select in Patient & Claim tab"});
    if(!tmpl)errs.push({field:"Letter template",tab:7,hint:"Select a template above"});
    return errs;
  };

  const genLetter=async()=>{
    const errs=validate();
    setErrors(errs);
    if(errs.length>0)return;
    setGen(true);
    const t=TMPLS.find(x=>x.id===tmpl);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:"Generate a professional "+claim.scheme+" referral letter for: "+t.label+". Patient: "+(claim.patientName||"[Patient]")+", DOB: "+(claim.dob||"[DOB]")+", Claim: "+(claim.claimNumber||"[Claim No]")+". Diagnosis: "+diags+". Referring: "+(prac&&prac.name||"[Practitioner]")+", "+(prac&&prac.profession||"")+", Provider: "+(prac&&prac.providerNo||"[No]")+", Clinic: "+clinic.name+". Referred to: "+(firstRef.name||"[Colleague]")+", "+(firstRef.specialty||"")+". Priority: "+(firstRef.priority||"Routine")+". Treatment: "+(claim.treatmentPlan||"As per clinical assessment")+". Scheme: "+claim.scheme+". Start with Dear "+(firstRef.name||"Colleague")+" and include: thank you for accepting, patient details, reason for referral, clinical summary, specific request. Close professionally. Australian medical letter format."}]})});
      const d=await r.json();
      if(d.error)setLetter("API error: "+d.error.message);
      else{const txt=d.content&&d.content[0]&&d.content[0].text||"Error generating letter";
      setLetter(txt);
      const entry={id:"ltr_"+Date.now(),template:t.label,generatedAt:new Date().toISOString(),content:txt};
      up("letterHistory",[...(claim.letterHistory||[]),entry]);}
    }catch(err){setLetter("Unable to generate letter: "+err.message);}
    setGen(false);
  };

  // Audit trail data
  const auditRows=[
    ["Created",claim.createdAt?new Date(claim.createdAt).toLocaleString("en-AU"):"—",claim.createdBy||"—"],
    ["Last edited",claim.lastEditedAt?new Date(claim.lastEditedAt).toLocaleString("en-AU"):"—",claim.lastEditedBy||"—"],
  ];

  return div({},[
    div({key:"h",style:{fontWeight:800,fontSize:"1.1rem",marginBottom:4}},"Referral & Export"),
    div({key:"s",style:{fontSize:"0.82rem",color:"#5B7A99",marginBottom:20}},"Generate professional referral letters. Auto-populated from claim data."),

    // Audit trail
    div({key:"audit",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:12}},"Claim audit trail"),
      e("table",{key:"t",style:{width:"100%",borderCollapse:"collapse",fontSize:"0.82rem"}},[
        e("thead",{key:"hd"},e("tr",null,[
          e("th",{key:"e",style:{textAlign:"left",padding:"6px 0",color:"#5B7A99",fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.07)"}},"Event"),
          e("th",{key:"t",style:{textAlign:"left",padding:"6px 0",color:"#5B7A99",fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.07)"}},"Timestamp"),
          e("th",{key:"u",style:{textAlign:"left",padding:"6px 0",color:"#5B7A99",fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.07)"}},"By"),
        ])),
        e("tbody",{key:"bd"},auditRows.map(([ev,ts,by])=>e("tr",{key:ev},[
          e("td",{key:"e",style:{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}},ev),
          e("td",{key:"t",style:{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",color:"#5B7A99",fontSize:"0.78rem"}},ts),
          e("td",{key:"u",style:{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",color:"#5B7A99"}},by),
        ])))
      ]),
    ]),

    // Referrals from treatment plan
    refs.length>0&&div({key:"refs",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:12}},"Referrals from treatment plan"),
      ...refs.map(r=>div({key:r.id,style:{...S.cardSm,marginBottom:8}},[
        div({key:"n",style:{fontWeight:600,fontSize:"0.87rem"}},r.specialty.replace(" (GP referral required)","")),
        r.name&&div({key:"d",style:{fontSize:"0.76rem",color:"#5B7A99",marginTop:2}},r.name+(r.clinic?" - "+r.clinic:"")),
      ])),
    ]),

    // Generate letter
    div({key:"gen",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Generate referral letter"),
      e(Sel,{key:"t",label:"Select letter template",value:tmpl,onChange:setTmpl,options:TMPLS.map(t=>({value:t.id,label:t.label}))}),

      // Validation errors
      errors.length>0&&div({key:"errs",style:{background:"rgba(255,77,109,0.08)",border:"1px solid rgba(255,77,109,0.25)",borderRadius:12,padding:"12px 16px",marginBottom:16}},[
        div({key:"h",style:{color:"#FF4D6D",fontWeight:600,marginBottom:8,fontSize:"0.88rem"}},"⚠️ Missing required fields — fix before generating:"),
        ...errors.map(err=>div({key:err.field,style:{fontSize:"0.82rem",color:"rgba(255,255,255,0.7)",marginBottom:4,display:"flex",gap:8,alignItems:"center"}},[
          span({key:"b",style:{color:"#FF4D6D"}},"•"),
          span({key:"f",style:{fontWeight:500}},err.field),
          span({key:"h",style:{color:"#5B7A99"}},err.hint),
        ])),
      ]),

      btn({key:"b",style:{...S.btnP,opacity:gen?0.7:1},onClick:genLetter,disabled:gen},
        gen?div({style:{display:"flex",alignItems:"center",gap:8}},["⏳ ","Generating letter..."]):"Generate letter"
      ),

      letter&&div({key:"letter",style:{marginTop:20}},[
        div({key:"hdr",style:{...S.fb,marginBottom:10}},[
          div({key:"t",style:{fontWeight:600,fontSize:"0.87rem"}},"Generated letter"),
          btn({key:"copy",style:S.btnS,onClick:()=>navigator.clipboard.writeText(letter).then(()=>alert("Copied!"))},"Copy"),
        ]),
        div({key:"body",style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"20px",fontFamily:"Georgia,serif",fontSize:"0.9rem",lineHeight:1.8,whiteSpace:"pre-wrap",color:"rgba(239,246,255,0.9)",maxHeight:480,overflow:"auto"}},letter),
      ]),
    ]),

    // Claim summary
    div({key:"summary",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Claim summary"),
      ...[["Patient",claim.patientName],["Claim number",claim.claimNumber],["Scheme",claim.scheme],["Insurer",claim.insurerName||claim.insurerNameCustom],["Case manager",claim.caseManagerName],["Case manager phone",claim.caseManagerPhone],["Case manager email",claim.caseManagerEmail],["Diagnosis",diags],["Fitness for work",claim.fitnessForWork],["COC valid",claim.cocFrom?(claim.cocFrom+" to "+claim.cocTo):null],["Practitioner",claim.practitionerName]].filter(([,v])=>v).map(([l,v])=>div({key:l,style:{fontSize:"0.85rem",lineHeight:2}},[span({key:"l",style:{color:"#5B7A99"}},l+": "),v||"—"])),
    ]),

    // Letter history
    (claim.letterHistory||[]).length>0&&div({key:"history",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Letter history"),
      div({key:"s",style:{fontSize:"0.78rem",color:"#5B7A99",marginBottom:12}},"Previously generated letters — click Regenerate to resend or copy."),
      ...[...(claim.letterHistory||[])].reverse().map((ltr,i)=>div({key:ltr.id,style:{...S.cardSm,marginBottom:10}},[
        div({key:"hdr",style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},[
          div({key:"l"},[
            div({key:"t",style:{fontWeight:600,fontSize:"0.87rem"}},ltr.template),
            div({key:"d",style:{fontSize:"0.74rem",color:"#5B7A99",marginTop:2}},new Date(ltr.generatedAt).toLocaleString("en-AU")),
          ]),
          div({key:"btns",style:{display:"flex",gap:8}},[
            btn({key:"copy",style:{...S.btnS,padding:"6px 14px",fontSize:"0.78rem"},onClick:()=>navigator.clipboard.writeText(ltr.content).then(()=>alert("Copied!"))},"Copy"),
            btn({key:"regen",style:{...S.btnP,padding:"6px 14px",fontSize:"0.78rem"},onClick:()=>setLetter(ltr.content)},"View"),
          ]),
        ]),
        div({key:"preview",style:{fontSize:"0.8rem",color:"#5B7A99",fontStyle:"italic",overflow:"hidden",maxHeight:36,lineHeight:1.5}},ltr.content.substring(0,120)+"..."),
      ])),
    ]),
  ]);
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[clinic,setClinic]=useState(null);
  const[claims,setClaims]=useState([]);
  const[nav,setNav]=useState("dashboard");
  const[activeClaim,setActiveClaim]=useState(null);
  const[collapsed,setCollapsed]=useState(false);
  useEffect(()=>{sget("session10:current").then(s=>{if(s){setClinic(s.clinic);loadClaims(s.clinic.id);}});},[]);
  const loadClaims=async cid=>{const s=await sget("claims10:"+cid)||[];setClaims(s);};
  const handleLogin=async c=>{setClinic(c);await sset("session10:current",{clinic:c});await loadClaims(c.id);setNav("dashboard");};
  const handleLogout=async()=>{await sdel("session10:current");setClinic(null);setClaims([]);setActiveClaim(null);setNav("dashboard");};
  const handleSave=async claim=>{
    const up=claims.find(c=>c.id===claim.id)?claims.map(c=>c.id===claim.id?claim:c):[...claims,claim];
    setClaims(up);await sset("claims10:"+clinic.id,up);setActiveClaim(claim);
  };
  const handleNav=n=>{if(n==="new_claim"){setActiveClaim(null);setNav("claim");}else setNav(n);};
  const handleOpen=c=>{setActiveClaim(c);setNav("claim");};
  const handleBack=()=>{setNav("dashboard");loadClaims(clinic.id);};
  if(!clinic)return e(LoginScreen,{onLogin:handleLogin});
  return div({style:{display:"flex",minHeight:"100vh"}},[
    e(Sidebar,{key:"sb",nav,onNav:handleNav,clinic,onLogout:handleLogout,collapsed,onToggle:()=>setCollapsed(!collapsed)}),
    div({key:"main",style:{flex:1,overflow:"auto"}},[
      e(TopBar,{key:"tb",clinic,nav,claim:activeClaim}),
      nav==="dashboard"&&e(Dashboard,{key:"d",clinic,claims,onNew:()=>{setActiveClaim(null);setNav("claim");},onOpen:handleOpen}),
      nav==="claims"&&e(ClaimsPage,{key:"cl",claims,onOpen:handleOpen,onNew:()=>{setActiveClaim(null);setNav("claim");}}),
      nav==="claim"&&e(ClaimForm,{key:"cf",clinic,claimData:activeClaim,onSave:handleSave,onBack:handleBack}),
      nav==="practitioners"&&e(PractitionersPage,{key:"pr",clinic}),
      nav==="settings"&&div({key:"set",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Settings"),
        div({key:"c",style:S.card},[
          div({key:"h",style:{fontWeight:700,marginBottom:12}},"Clinic details"),
          ...[["Name",clinic.name],["Plan",clinic.plan],["ABN",clinic.abn]].map(([l,v])=>div({key:l,style:{fontSize:"0.88rem",lineHeight:2}},[span({key:"l",style:{color:"#5B7A99"}},l+": "),v])),
        ]),
      ]),
      nav==="help"&&div({key:"help",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Help & Support"),
        div({key:"c",style:S.card},[
          div({key:"h",style:{fontWeight:700,marginBottom:14}},"Quick guide"),
          ...[
            ["1","Complete Patient & Claim first","Select scheme (WorkCover/TAC), insurer and add patient details."],
            ["2","Add diagnoses in the Diagnosis tab","Search conditions. Complete physical & mental capacity assessments."],
            ["3","Track outcome measures","In Treatment Plan → Outcome Measures, add PSFS, DASS-21, Oswestry etc. Scores appear in the COC."],
            ["4","Certificate of Capacity","Click 'Preview & Print COC' to see the official WorkSafe VIC form, ready to print."],
            ["5","RTW & Rehab Plan","Evidence-based timeframes auto-calculate from your diagnoses + psychosocial flags. Override any estimate."],
          ].map(([n,t,d])=>div({key:n,style:{display:"flex",gap:14,marginBottom:16}},[
            div({key:"num",style:{width:28,height:28,borderRadius:"50%",background:"rgba(0,201,167,0.15)",border:"1px solid rgba(0,201,167,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontWeight:700,color:"#00C9A7",fontSize:"0.84rem",flexShrink:0}},n),
            div({key:"text"},[div({key:"t",style:{fontWeight:600,fontSize:"0.9rem",marginBottom:3}},t),div({key:"d",style:{fontSize:"0.82rem",color:"#5B7A99",lineHeight:1.5}},d)]),
          ])),
        ]),
      ]),
      nav==="invoicing"&&div({key:"inv",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Invoicing"),
        div({key:"c",style:{...S.card,textAlign:"center",padding:"40px"}},[
          div({key:"i",style:{fontSize:"2.5rem",marginBottom:12}},"🧾"),
          div({key:"t",style:{fontWeight:600,marginBottom:8}},"Coming soon"),
          div({key:"s",style:{fontSize:"0.84rem",color:"#5B7A99"}},"Invoice generation with WorkSafe and TAC item codes will be available in the next update."),
        ]),
      ]),
    ]),
  ]);
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
}catch(err){
  document.getElementById("root").innerHTML="<div style='padding:40px;background:#07101E;min-height:100vh;color:#FF4D6D;font-family:sans-serif'><h2>Error</h2><pre style='margin-top:16px;white-space:pre-wrap;color:#EFF6FF;font-size:13px'>"+err.stack+"</pre></div>";
  console.error("ClaimBridge error:",err);
}</script>
