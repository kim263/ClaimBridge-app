// ── HELPERS ───────────────────────────────────────────────────────────────────
function div(props,...children){return e("div",props,...children);}
function span(props,...children){return e("span",props,...children);}
function btn(props,...children){return e("button",props,...children);}
function inp(props){return e("input",props);}
function sel(props,...children){return e("select",props,...children);}
function opt(val,lbl){return e("option",{key:val,value:val},lbl||val);}
function ta(props){return e("textarea",props);}
function lbl(props,...children){return e("label",props,...children);}

function Inp({label:l,value,onChange,placeholder,type="text",required,mb=16}){
  return div({style:{marginBottom:mb}},[
    l&&e("label",{key:"l",style:S.label},l,required&&span({key:"r",style:{color:"#FF4D6D",marginLeft:3}},"*")),
    inp({key:"i",className:"cb-input",style:S.inp,type,value:value||"",onChange:ev=>onChange(ev.target.value),placeholder:placeholder||""}),
  ]);
}
function Sel({label:l,value,onChange,options,required,mb=16}){
  return div({style:{marginBottom:mb}},[
    l&&e("label",{key:"l",style:S.label},l,required&&span({key:"r",style:{color:"#FF4D6D",marginLeft:3}},"*")),
    e("select",{key:"s",className:"cb-sel",style:S.sel,value:value||"",onChange:ev=>onChange(ev.target.value)},[
      e("option",{key:"__",value:""},"Select..."),
      ...(options||[]).map(o=>typeof o==="string"?e("option",{key:o,value:o},o):e("option",{key:o.value||o.id,value:o.value||o.id},o.label||o.name)),
    ]),
  ]);
}
function Ta({label:l,value,onChange,placeholder,rows=3,mb=16}){
  return div({style:{marginBottom:mb}},[
    l&&e("label",{key:"l",style:S.label},l),
    ta({key:"t",className:"cb-ta",style:{...S.ta,minHeight:rows*36},value:value||"",onChange:ev=>onChange(ev.target.value),placeholder:placeholder||""}),
  ]);
}
function Pill({children,active,color,onClick,style:sx}){
  const base=color?{...S.pill,background:active?color+"22":"rgba(255,255,255,0.03)",borderColor:active?color+"55":"rgba(255,255,255,0.08)",color:active?color:"rgba(255,255,255,0.5)"}:
    {...S.pill,...(active?S.pillT:S.pillM)};
  return btn({style:{...base,...(sx||{})},onClick:onClick||null},children);
}
function OK({children}){return div({style:S.ok},"✅ ",children);}
function WARN({children}){return div({style:S.warn},"⚠️ ",children);}

function Collapsible({title,children,icon,defaultOpen=false}){
  const[open,setOpen]=useState(defaultOpen);
  return div({style:{border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,overflow:"hidden",marginBottom:16}},[
    btn({key:"h",className:"coll-btn",onClick:()=>setOpen(!open),style:{width:"100%",background:"rgba(255,255,255,0.03)",border:"none",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",color:"#EFF6FF",textAlign:"left"}},[
      div({key:"t",style:{display:"flex",alignItems:"center",gap:10,fontWeight:600,fontSize:"0.9rem"}},icon&&span({key:"i"},icon)," ",title),
      span({key:"a",style:{color:"rgba(255,255,255,0.4)",display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}},"v"),
    ]),
    open&&div({key:"b",style:{padding:"18px",borderTop:"1px solid rgba(255,255,255,0.07)"}},children),
  ]);
}

function Modal({msg,onClose,onConfirm}){
  return div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
    div({style:{...S.card,maxWidth:360,width:"90%",textAlign:"center",marginBottom:0}},[
      div({key:"i",style:{fontSize:"1.8rem",marginBottom:14}},"✅"),
      div({key:"m",style:{fontWeight:600,marginBottom:6}},msg),
      div({key:"b",style:{display:"flex",gap:10,justifyContent:"center",marginTop:20}},[
        btn({key:"c",style:S.btnS,onClick:onClose},"Close"),
        onConfirm&&btn({key:"ok",style:S.btnP,onClick:onConfirm},"Continue"),
      ]),
    ])
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const go=async()=>{
    setErr("");setLoading(true);
    await new Promise(r=>setTimeout(r,500));
    const c=DEMO_CLINICS.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.password===pw);
    if(c){const prac=DEMO_PRACTITIONERS[c.id]||[];const ex=await sget("practitioners:"+c.id);if(!ex)await sset("practitioners:"+c.id,prac);onLogin(c);}
    else setErr("Invalid credentials. Try admin@baysidemedical.com.au / demo1234");
    setLoading(false);
  };
  return div({style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#07101E",padding:24}},
    div({style:{width:"100%",maxWidth:400}},[
      div({key:"logo",style:{textAlign:"center",marginBottom:36}},[
        div({key:"t",style:{fontWeight:800,fontSize:"2rem",letterSpacing:"-0.03em",marginBottom:8}},["Claim",span({key:"s",style:{color:"#00C9A7"}},"Bridge")]),
        div({key:"s",style:{fontSize:"0.88rem",color:"#5B7A99"}},"WorkCover & TAC Documentation Platform"),
      ]),
      div({key:"card",style:S.card},[
        div({key:"h",style:{fontWeight:700,fontSize:"1rem",marginBottom:20}},"Sign in to your clinic"),
        e(Inp,{key:"e",label:"Email address",value:email,onChange:setEmail,type:"email",placeholder:"clinic@example.com.au"}),
        e(Inp,{key:"p",label:"Password",value:pw,onChange:setPw,type:"password",placeholder:"••••••••"}),
        err&&e(WARN,{key:"err"},err),
        btn({key:"b",style:{...S.btnP,width:"100%",justifyContent:"center",padding:"14px",display:"block"},onClick:go,disabled:loading},loading?"Signing in...":"Sign in ->"),
        div({key:"demo",style:{textAlign:"center",marginTop:14,fontSize:"0.75rem",color:"#5B7A99"}},"Demo: admin@baysidemedical.com.au / demo1234"),
      ]),
    ])
  );
}

function Tab3({claim,up}){

    up("imagingReports",[...reports,nr]);setUploading(false);

    setGenerating(rid);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:"Generate a realistic radiology report summary for a WorkCover patient. Return JSON only with fields: dateOfImaging, requestingPractitioner, reportingRadiologist, facility, clinicalSummary, keyFindings."}]})});

      up("imagingReports",reports.map(r=>r.id===rid?{...r,summary}:r));
    }catch{up("imagingReports",reports.map(r=>r.id===rid?{...r,summary:{clinicalSummary:"AI summary unavailable. Review manually.",keyFindings:"Manual review required"}}:r));}

    ]),
    ...reports.map(r=>div({key:r.id,style:S.card},[

    ]),
    div({key:"rehab",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Suggested treatment & recovery plan"),
      e(Ta,{key:"p1",label:"Phase 1 - Acute (Week 1-4)",value:claim.rehabPhase1,onChange:v=>up("rehabPhase1",v),placeholder:"Goals and interventions..."}),
      e(Ta,{key:"p2",label:"Phase 2 - Rehabilitation (Week 4-12)",value:claim.rehabPhase2,onChange:v=>up("rehabPhase2",v),placeholder:"Goals and interventions..."}),
      e(Ta,{key:"p3",label:"Phase 3 - Return to work (Week 12+)",value:claim.rehabPhase3,onChange:v=>up("rehabPhase3",v),placeholder:"Goals and work reintegration..."}),
    ]),
  ]);
}

// ── TAB 8: REFERRAL & EXPORT ──────────────────────────────────────────────────
function Tab8({claim,up,clinic,practitioners}){
  const[tmpl,setTmpl]=useState("");
  const[letter,setLetter]=useState("");
  const[gen,setGen]=useState(false);
  const TMPLS=[
    {id:"specialist_opinion",label:"Specialist referral - Opinion"},
    {id:"specialist_ongoing",label:"Specialist referral - Ongoing management"},
    {id:"allied_health",label:"Allied health referral"},
    {id:"psychology",label:"Psychology referral"},
    {id:"gym_swim",label:"Gym / Swim referral"},
    {id:"radiology",label:"Radiological imaging referral"},
    {id:"household",label:"Household / ADL assessment"},
    {id:"travel",label:"Travel & accommodation request"},
    {id:"procedure",label:"Procedure / Surgery request"},
  ];
  const refs=claim.referrals||[];
  const prac=practitioners.find(p=>p.id===claim.practitionerId);
  const diags=(claim.diagnoses||[]).map(d=>d.label).join(", ")||"Not specified";
  const firstRef=refs[0]||{};
  const genLetter=async()=>{
    if(!tmpl)return;setGen(true);
    const t=TMPLS.find(x=>x.id===tmpl);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:(()=>{
        const travelSection=claim.travelRequired==="yes"?"\n\nTRAVEL REQUEST: I am also requesting approval for funded travel for this patient. "+claim.travelReasoning:"";
        const accSection=claim.accommodationRequired==="yes"?"\n\nACCOMMODATION REQUEST: Accommodation for "+(claim.accommodationNights||"[X]")+" nights is also requested. "+claim.accommodationReasoning:"";
        return "Generate a professional "+claim.scheme+" referral letter for: "+t.label+travelSection+accSection;
      })()+". Patient: "+(claim.patientName||"[Patient]")+", DOB: "+(claim.dob||"[DOB]")+", Claim: "+(claim.claimNumber||"[Claim No]")+". Diagnosis: "+diags+". Referring: "+(prac&&prac.name||"[Practitioner]")+", "+(prac&&prac.profession||"")+", Provider: "+(prac&&prac.providerNo||"[No]")+", Clinic: "+clinic.name+". Referred to: "+(firstRef.name||"[Colleague]")+", "+(firstRef.specialty||"")+". Priority: "+(firstRef.priority||"Routine")+". Treatment: "+(claim.treatmentPlan||"As per clinical assessment")+". Scheme: "+claim.scheme+". Start with Dear "+(firstRef.name||"Colleague")+" and include: thank you for accepting, patient details, reason for referral, clinical summary including causation and pathophysiology, specific request. Close professionally. Australian medical letter format."}]})});
      const d=await r.json();setLetter(d.content&&d.content[0]&&d.content[0].text||"Error generating letter");
    }catch{setLetter("Unable to generate letter. Please try again.");}
    setGen(false);
  };
  return div({},[
    div({key:"h",style:{fontWeight:800,fontSize:"1.1rem",marginBottom:4}},"Referral & Export"),
    div({key:"s",style:{fontSize:"0.82rem",color:"#5B7A99",marginBottom:20}},"Generate professional referral letters. Auto-populated from claim data."),
    refs.length>0&&div({key:"refs",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:12}},"Referrals from treatment plan"),
      ...refs.map(r=>div({key:r.id,style:{...S.cardSm,marginBottom:8}},[
        div({key:"n",style:{fontWeight:600,fontSize:"0.87rem"}},r.specialty.replace(" (GP referral required)","")),
        r.name&&div({key:"d",style:{fontSize:"0.76rem",color:"#5B7A99",marginTop:2}},r.name+(r.clinic?" - "+r.clinic:"")+(r.email?" - "+r.email:"")),
      ])),
    ]),
    div({key:"gen",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Generate referral letter"),
      e(Sel,{key:"t",label:"Select letter template",value:tmpl,onChange:setTmpl,options:TMPLS.map(t=>({value:t.id,label:t.label}))}),
      btn({key:"b",style:S.btnP,onClick:genLetter,disabled:gen||!tmpl},gen?"Generating letter...":"Generate letter"),
      letter&&div({key:"letter",style:{marginTop:20}},[
        div({key:"hdr",style:{...S.fb,marginBottom:10}},[
          div({key:"t",style:{fontWeight:600,fontSize:"0.87rem"}},"Generated letter"),
          btn({key:"copy",style:S.btnS,onClick:()=>{navigator.clipboard.writeText(letter).then(()=>alert("Copied!"));}},  "Copy"),
        ]),
        div({key:"body",style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"20px",fontFamily:"Georgia,serif",fontSize:"0.9rem",lineHeight:1.8,whiteSpace:"pre-wrap",color:"rgba(239,246,255,0.9)",maxHeight:480,overflow:"auto"}},letter),
        div({key:"btns",style:{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}},[
          btn({key:"prac",style:{...S.btnP,fontSize:"0.83rem",padding:"9px 16px"}},"Send to practitioner"),
          btn({key:"ins",style:{...S.btnS,fontSize:"0.83rem",padding:"9px 16px"}},"Send to insurer"),
          btn({key:"pat",style:{...S.btnS,fontSize:"0.83rem",padding:"9px 16px"}},"CC patient"),
        ]),
      ]),
    ]),
    div({key:"travel",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Travel & accommodation"),
      div({key:"trav-row",style:{marginBottom:16}},[
        e("label",{key:"l",style:S.label},"Travel required?"),
        div({key:"btns",style:{display:"flex",gap:10,marginBottom:10}},[
          btn({key:"y",onClick:()=>up("travelRequired","yes"),style:{...S.pill,...(claim.travelRequired==="yes"?S.pillT:S.pillM),padding:"9px 20px"}},"Yes - travel required"),
          btn({key:"n",onClick:()=>up("travelRequired","no"),style:{...S.pill,...(claim.travelRequired==="no"?S.pillT:S.pillM),padding:"9px 20px"}},"No"),
        ]),
        claim.travelRequired==="yes"&&e(Ta,{key:"tr",label:"Clinical reasoning for funded travel",value:claim.travelReasoning,onChange:v=>up("travelReasoning",v),placeholder:"e.g. Patient is unable to travel by private vehicle due to cervical injury preventing safe head rotation. Public transport is not accessible due to inability to stand for extended periods..."}),
      ]),
      div({key:"acc-row"},[
        e("label",{key:"l",style:S.label},"Accommodation required?"),
        div({key:"btns",style:{display:"flex",gap:10,marginBottom:10}},[
          btn({key:"y",onClick:()=>up("accommodationRequired","yes"),style:{...S.pill,...(claim.accommodationRequired==="yes"?S.pillT:S.pillM),padding:"9px 20px"}},"Yes - accommodation required"),
          btn({key:"n",onClick:()=>up("accommodationRequired","no"),style:{...S.pill,...(claim.accommodationRequired==="no"?S.pillT:S.pillM),padding:"9px 20px"}},"No"),
        ]),
        claim.accommodationRequired==="yes"&&div({key:"acc-det"},[
          e(Inp,{key:"nights",label:"Number of nights required",value:claim.accommodationNights,onChange:v=>up("accommodationNights",v),placeholder:"e.g. 2 nights"}),
          e(Ta,{key:"ar",label:"Clinical reasoning for accommodation",value:claim.accommodationReasoning,onChange:v=>up("accommodationReasoning",v),placeholder:"Clinical reasoning for funded accommodation..."}),
        ]),
      ]),
      (claim.travelRequired==="yes"||claim.accommodationRequired==="yes")&&e(OK,{key:"ok"},"Travel/accommodation details will be included in the generated referral letter."),
    ]),
    div({key:"summary",style:S.card},[
      div({key:"h",style:{fontWeight:700,marginBottom:14}},"Claim summary"),
      ...[["Patient",claim.patientName],["Claim number",claim.claimNumber],["Scheme",claim.scheme],["Insurer",claim.insurerName||claim.insurerNameCustom],["Diagnosis",diags],["Fitness for work",claim.fitnessForWork],["COC valid",claim.cocFrom?(claim.cocFrom+" to "+claim.cocTo):null],["Practitioner",claim.practitionerName]].map(([l,v])=>div({key:l,style:{fontSize:"0.85rem",lineHeight:2}},[span({key:"l",style:{color:"#5B7A99"}},l+": "),v||"—"])),
    ]),
  ]);
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[clinic,setClinic]=useState(null);
  const[claims,setClaims]=useState([]);
  const[nav,setNav]=useState("dashboard");
  const[activeClaim,setActiveClaim]=useState(null);
  const[collapsed,setCollapsed]=useState(false);
  useEffect(()=>{sget("session9:current").then(s=>{if(s){setClinic(s.clinic);loadClaims(s.clinic.id);}});},[]);
  const loadClaims=async cid=>{const s=await sget("claims9:"+cid)||[];setClaims(s);};
  const handleLogin=async c=>{setClinic(c);await sset("session9:current",{clinic:c});await loadClaims(c.id);setNav("dashboard");};
  const handleLogout=async()=>{await sdel("session9:current");setClinic(null);setClaims([]);setActiveClaim(null);setNav("dashboard");};
  const handleSave=async claim=>{const up=claims.find(c=>c.id===claim.id)?claims.map(c=>c.id===claim.id?claim:c):[...claims,claim];setClaims(up);await sset("claims9:"+clinic.id,up);setActiveClaim(claim);};
  const handleNav=n=>{if(n==="new_claim"){setActiveClaim(null);setNav("claim");}else setNav(n);};
  const handleOpen=c=>{setActiveClaim(c);setNav("claim");};
  const handleBack=()=>{setNav("dashboard");loadClaims(clinic.id);};
  if(!clinic)return e(LoginScreen,{onLogin:handleLogin});
  return div({style:{display:"flex",minHeight:"100vh"}},[
    e(Sidebar,{key:"sb",nav,onNav:handleNav,clinic,onLogout:handleLogout,collapsed,onToggle:()=>setCollapsed(!collapsed)}),
    div({key:"main",style:{flex:1,overflow:"auto"}},[
      e(TopBar,{key:"tb",clinic,nav,claim:activeClaim}),
      nav==="dashboard"&&e(Dashboard,{key:"d",clinic,claims,onNew:()=>{setActiveClaim(null);setNav("claim");},onOpen:handleOpen}),
      nav==="claims"&&e(ClaimsPage,{key:"cl",claims,onOpen:handleOpen,onNew:()=>{setActiveClaim(null);setNav("claim");}}),
      nav==="claim"&&e(ClaimForm,{key:"cf",clinic,claimData:activeClaim,onSave:handleSave,onBack:handleBack}),
      nav==="practitioners"&&e(PractitionersPage,{key:"pr",clinic}),
      nav==="settings"&&div({key:"set",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Settings"),
        div({key:"c",style:S.card},[
          div({key:"h",style:{fontWeight:700,marginBottom:12}},"Clinic details"),
          ...[["Name",clinic.name],["Plan",clinic.plan],["ABN",clinic.abn]].map(([l,v])=>div({key:l,style:{fontSize:"0.88rem",lineHeight:2}},[span({key:"l",style:{color:"#5B7A99"}},l+": "),v])),
        ]),
      ]),
      nav==="help"&&div({key:"help",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Help & Support"),
        div({key:"c",style:S.card},[
          div({key:"h",style:{fontWeight:700,marginBottom:14}},"Quick guide"),
          ...[["1","Select scheme first","Always choose WorkCover or TAC at the top of Patient & Claim."],["2","Add practitioners","Go to Practitioners in the sidebar to add staff and provider numbers."],["3","Work through each tab","Complete tabs in order. Use Next at the bottom."],["4","Save often","Use Save draft to preserve progress at any time."],["5","Generate referral letters","On the Referral & Export tab, select a template and click Generate."]].map(([n,t,d])=>div({key:n,style:{display:"flex",gap:14,marginBottom:16}},[
            div({key:"num",style:{width:28,height:28,borderRadius:"50%",background:"rgba(0,201,167,0.15)",border:"1px solid rgba(0,201,167,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontWeight:700,color:"#00C9A7",fontSize:"0.84rem",flexShrink:0}},n),
            div({key:"text"},[div({key:"t",style:{fontWeight:600,fontSize:"0.9rem",marginBottom:3}},t),div({key:"d",style:{fontSize:"0.82rem",color:"#5B7A99",lineHeight:1.5}},d)]),
          ])),
        ]),
      ]),
      nav==="invoicing"&&div({key:"inv",style:{padding:"28px",maxWidth:960,margin:"0 auto"}},[
        div({key:"h",style:{fontWeight:800,fontSize:"1.2rem",marginBottom:20}},"Invoicing"),
        div({key:"c",style:{...S.card,textAlign:"center",padding:"40px"}},[
          div({key:"i",style:{fontSize:"2.5rem",marginBottom:12}},"🧾"),
          div({key:"t",style:{fontWeight:600,marginBottom:8}},"Coming soon"),
          div({key:"s",style:{fontSize:"0.84rem",color:"#5B7A99"}},"Invoice generation with WorkSafe and TAC item codes will be available in the next update."),
        ]),
      ]),
    ]),
  ]);
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
}catch(err){
  document.getElementById("root").innerHTML="<div style='padding:40px;background:#07101E;min-height:100vh;color:#FF4D6D;font-family:sans-serif'><h2>Error</h2><pre style='margin-top:16px;white-space:pre-wrap;color:#EFF6FF;font-size:13px'>"+err.stack+"</pre></div>";
  console.error("ClaimBridge error:",err);
}
</script>
</body>
</html>
