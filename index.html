function LoginScreen({onLogin}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);

  const go=async()=>{
    setErr('');setLoading(true);
    await new Promise(r=>setTimeout(r,500));
    const c=DEMO_CLINICS.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.password===pw);
    if(c){
      const prac=DEMO_PRACTITIONERS[c.id]||[];
      const existing=await sget('practitioners:'+c.id);
      if(!existing)await sset('practitioners:'+c.id,prac);
      onLogin(c);
    }else{
      setErr('Invalid credentials. Try admin@baysidemedical.com.au / demo1234');
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#07101E',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:36}}>

          <Inp label='Password' value={pw} onChange={setPw} type='password' placeholder='••••••••'/>
          {err&&<div style={css.warn}>⚠️ {err}</div>}
          <button style={{...css.btnP,width:'100%',justifyContent:'center',padding:'14px'}} onClick={go} disabled={loading}>{loading?'Signing in…':'Sign in →'}</button>
          <div style={{textAlign:'center',marginTop:14,fontSize:'0.75rem',color:'#5B7A99'}}>Demo: admin@baysidemedical.com.au / demo1234</div>

  );
}

function Dashboard({clinic,claims,onNew,onOpen}){
  const active=claims.filter(c=>c.status==='Active').length;
  const pending=claims.filter(c=>c.status==='Pending Approval').length;

  const thisMonth=claims.filter(c=>c.createdAt&&new Date(c.createdAt).getMonth()===now.getMonth()).length;
  const statusPill=(s)=>{
    if(s==='Active')return css.pillT;
    if(s==='Pending Approval')return css.pillA;
    return css.pillM;
  };
  return(
    <div style={css.page}>
      <div style={{...css.fb,marginBottom:28}}>

          <div style={{fontSize:'0.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#00C9A7',marginBottom:4}}>Welcome back</div>

function ClaimsPage({claims,onOpen,onNew}){
  const[q,setQ]=useState('');

  const filtered=claims.filter(c=>{
    const ms=!q||(c.patientName||'').toLowerCase().includes(q.toLowerCase())||(c.claimNumber||'').toLowerCase().includes(q.toLowerCase());

function PractitionersPage({clinic}){
  const[list,setList]=useState([]);
  const[f,setF]=useState({name:'',profession:'',providerNo:'',email:'',phone:''});
  const[saved,setSaved]=useState(false);
  const PROFS=['General Practitioner','Physiotherapist','Osteopath','Chiropractor','Pain Specialist','Orthopaedic Surgeon','Occupational Therapist','Exercise Physiologist','Psychologist','Podiatrist','Other'];
  useEffect(()=>{sget('practitioners:'+clinic.id).then(p=>setList(p||[]));},[clinic.id]);
  const add=async()=>{
    if(!f.name||!f.profession)return;
    const up=[...list,{...f,id:'p'+Date.now()}];
    setList(up);await sset('practitioners:'+clinic.id,up);
    setF({name:'',profession:'',providerNo:'',email:'',phone:''});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const remove=async(id)=>{const up=list.filter(p=>p.id!==id);setList(up);await sset('practitioners:'+clinic.id,up);};
  return(
    <div style={css.page}>
      <div style={{fontWeight:800,fontSize:'1.2rem',marginBottom:4}}>👥 Practitioners</div>
      <div style={{fontSize:'0.82rem',color:'#5B7A99',marginBottom:24}}>Provider numbers auto-populate when a practitioner is selected on a claim.</div>
      {saved&&<div style={css.ok}>✅ Practitioner saved successfully</div>}
      <div style={{...css.g2,alignItems:'start'}}>
        <div style={css.card}>
          <div style={{fontWeight:700,marginBottom:18}}>Add practitioner</div>
          <Inp label='Full name' value={f.name} onChange={v=>setF({...f,name:v})} placeholder='Dr. Jane Smith' required/>
          <Sel label='Profession' value={f.profession} onChange={v=>setF({...f,profession:v})} options={PROFS} required/>
          <Inp label='Provider number' value={f.providerNo} onChange={v=>setF({...f,providerNo:v})} placeholder='123456A'/>
          <Inp label='Email' value={f.email} onChange={v=>setF({...f,email:v})} type='email' placeholder='dr@clinic.com.au'/>
          <Inp label='Phone' value={f.phone} onChange={v=>setF({...f,phone:v})} placeholder='03 9XXX XXXX'/>
          <button style={css.btnP} onClick={add}>+ Add practitioner</button>
        </div>
        <div>
          <div style={{fontWeight:600,marginBottom:12,fontSize:'0.88rem'}}>{list.length} practitioner{list.length!==1?'s':''}</div>
          {list.map(p=>(

function ClaimForm({clinic,claimData,onSave,onBack}){
  const TABS=['Patient & Claim','Diagnosis','Imaging','Treatment Plan','Certificate of Capacity','Allied Health Forms','RTW & Rehab Plan','Referral & Export'];
  const[tab,setTab]=useState(0);
  const[claim,setClaim]=useState(claimData||{id:'claim_'+Date.now(),scheme:'WorkCover',status:'Active',createdAt:new Date().toISOString(),clinicId:clinic.id});
  const[practitioners,setPractitioners]=useState([]);
  const[savedModal,setSavedModal]=useState(false);
  const[draftModal,setDraftModal]=useState(false);
  useEffect(()=>{sget('practitioners:'+clinic.id).then(p=>setPractitioners(p||[]));},[clinic.id]);
  const up=(field,value)=>setClaim(prev=>({...prev,[field]:value}));
  const save=async()=>{await onSave(claim);setSavedModal(true);};
  const saveDraft=async()=>{await onSave(claim);setDraftModal(true);};
  return(
    <div style={css.page}>
      {savedModal&&<Modal msg='Claim saved successfully!' onClose={()=>setSavedModal(false)}/>}
      {draftModal&&<Modal msg='Draft saved! Continue editing from the Claims list.' onClose={()=>{setDraftModal(false);onBack();}} onConfirm={()=>{setDraftModal(false);onBack();}}/>}
      <div style={{...css.fb,marginBottom:22}}>
        <div style={css.fr}>
          <button style={css.btnS} onClick={onBack}>← Back</button>
          <div style={{fontWeight:700,fontSize:'0.95rem'}}>{claim.patientName||'New Claim'}</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button style={css.btnS} onClick={saveDraft}>💾 Save draft</button>
          <button style={css.btnP} onClick={save}>Save claim</button>
        </div>
      </div>
      <div style={css.tabBar}>
        {TABS.map((t,i)=><button key={t} style={{...css.tab,...(tab===i?css.tabA:{})}} onClick={()=>setTab(i)}>{i+1}. {t}</button>)}
      </div>
      {tab===0&&<Tab1 claim={claim} up={up} practitioners={practitioners}/>}
      {tab===1&&<Tab2 claim={claim} up={up}/>}
      {tab===2&&<Tab3 claim={claim} up={up}/>}
      {tab===3&&<Tab4 claim={claim} up={up}/>}
      {tab===4&&<Tab6 claim={claim} up={up}/>}
      {tab===5&&<Tab7 claim={claim} up={up}/>}
      {tab===6&&<Tab8 claim={claim} up={up}/>}
      {tab===7&&<Tab9 claim={claim} up={up} clinic={clinic} practitioners={practitioners}/>}
      <div style={{...css.fb,marginTop:28,paddingTop:20,borderTop:'1px solid rgba(255,255,255,0.07)'}}>
        <button style={{...css.btnS,...(tab===0?{opacity:0.3,pointerEvents:'none'}:{})}} onClick={()=>setTab(t=>Math.max(0,t-1))}>← Previous</button>
        <span style={{fontSize:'0.76rem',color:'#5B7A99'}}>{tab+1} / {TABS.length}</span>
        <button style={{...css.btnP,...(tab===TABS.length-1?{opacity:0.3,pointerEvents:'none'}:{})}} onClick={()=>setTab(t=>Math.min(TABS.length-1,t+1))}>Next →</button>
      </div>
    </div>
  );
}

function Tab2({claim,up}){

function Tab3({claim,up}){
  const[uploading,setUploading]=useState(false);
  const[generating,setGenerating]=useState(false);
  const reports=claim.imagingReports||[];
  const upload=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    setUploading(true);await new Promise(r=>setTimeout(r,700));
    const nr={id:'img_'+Date.now(),name:f.name,size:(f.size/1024).toFixed(0)+'KB',uploadedAt:new Date().toISOString(),summary:null};
    up('imagingReports',[...reports,nr]);setUploading(false);
  };
  const genSummary=async(rid)=>{
    setGenerating(rid);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Generate a realistic radiology report summary for a WorkCover patient. Return JSON only with fields: dateOfImaging, requestingPractitioner, reportingRadiologist, facility, clinicalSummary, keyFindings. Be concise and clinically appropriate.`}]})});
      const data=await res.json();
      let summary;try{summary=JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());}catch{summary={clinicalSummary:data.content?.[0]?.text||'See report',keyFindings:'Manual review required'};}
      up('imagingReports',reports.map(r=>r.id===rid?{...r,summary}:r));
    }catch{up('imagingReports',reports.map(r=>r.id===rid?{...r,summary:{clinicalSummary:'AI summary unavailable. Review manually.',keyFindings:'Manual review required'}}:r));}
    setGenerating(false);
  };
  return(
    <div>
      <div style={{fontWeight:800,fontSize:'1.1rem',marginBottom:4}}>🩻 Imaging Reports</div>
      <div style={{fontSize:'0.82rem',color:'#5B7A99',marginBottom:20}}>Upload reports — AI extracts key details and generates a clinical summary automatically.</div>
      <div style={{...css.card,textAlign:'center',padding:'32px'}}>
        <div style={{fontSize:'2.5rem',marginBottom:10}}>📄</div>
        <div style={{fontWeight:600,marginBottom:6}}>Upload radiology report</div>
        <div style={{fontSize:'0.82rem',color:'#5B7A99',marginBottom:18}}>PDF or image · AI summary generated automatically</div>
        <label style={{...css.btnP,cursor:'pointer'}}>{uploading?'Uploading…':'📎 Choose file'}<input type='file' accept='.pdf,.jpg,.jpeg,.png' onChange={upload} style={{display:'none'}}/></label>
      </div>
      {reports.map(r=>(
        <div key={r.id} style={css.card}>
          <div style={{...css.fb,marginBottom:r.summary?14:0}}>
            <div style={css.fr}>
              <span style={{fontSize:'1.4rem'}}>📋</span>
              <div><div style={{fontWeight:600,fontSize:'0.9rem'}}>{r.name}</div><div style={{fontSize:'0.74rem',color:'#5B7A99',marginTop:2}}>{r.size} · {new Date(r.uploadedAt).toLocaleDateString('en-AU')}</div></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              {!r.summary&&<button style={css.btnP} onClick={()=>genSummary(r.id)} disabled={generating===r.id}>{generating===r.id?'⚡ Generating…':'⚡ AI Summary'}</button>}
              <button style={css.btnD} onClick={()=>up('imagingReports',reports.filter(x=>x.id!==r.id))}>Remove</button>
            </div>
          </div>
          {r.summary&&<div style={{background:'rgba(0,201,167,0.06)',border:'1px solid rgba(0,201,167,0.2)',borderRadius:10,padding:'16px'}}>
            <div style={{fontWeight:700,color:'#00C9A7',marginBottom:12,fontSize:'0.82rem',textTransform:'uppercase',letterSpacing:'0.08em'}}>AI Radiology Summary</div>
            {[['Date of imaging',r.summary.dateOfImaging],['Requesting practitioner',r.summary.requestingPractitioner],['Reporting radiologist',r.summary.reportingRadiologist],['Facility',r.summary.facility],['Clinical summary',r.summary.clinicalSummary],['Key findings',r.summary.keyFindings]].map(([lbl,val])=>val?<div key={lbl} style={{fontSize:'0.84rem',marginBottom:6}}><span style={{color:'#5B7A99'}}>{lbl}:</span> {val}</div>:null)}
          </div>}
        </div>
      ))}
      {reports.length===0&&<div style={{textAlign:'center',color:'#5B7A99',fontSize:'0.84rem',padding:'16px 0'}}>No reports uploaded yet</div>}
    </div>
  );
}

const PRESCRIBING_PROFESSIONS=['General Practitioner','Pain Specialist','Orthopaedic Surgeon','Psychiatrist','Neurologist','Rehabilitation Physician','Rheumatologist','Other Specialist'];

function MedicationSection({claim,up}){
  const[meds,setMeds]=useState(claim.medications||[]);

    if(!nm.name)return;

        <div style={{display:'flex',flexDirection:'column',gap:8}}>{FORMS.map(f=><button key={f.id} onClick={()=>{setSel(f.id);up('alliedForm',f.id);}} style={{...css.cardSm,textAlign:'left',border:'1px solid '+(sel===f.id?'rgba(0,201,167,0.35)':'rgba(255,255,255,0.07)'),background:sel===f.id?'rgba(0,201,167,0.08)':'rgba(255,255,255,0.03)',cursor:'pointer',color:'#EFF6FF',fontWeight:sel===f.id?600:400,transition:'all 0.15s'}}>{f.label}</button>)}</div>
      </div>
      {sel==='ahrmp'&&<div style={css.card}><div style={{fontWeight:700,marginBottom:14}}>Allied Health Recovery Management Plan</div><div style={css.ok}>✅ Patient, diagnosis and capacity details pre-populated</div><Ta label='Treatment goals' value={claim.ahrmGoals} onChange={v=>up('ahrmGoals',v)} placeholder='Specific goals for this referral...'/><div style={css.g2}><Inp label='Treatment type' value={claim.ahrmTreatment} onChange={v=>up('ahrmTreatment',v)} placeholder='e.g. Physiotherapy'/><Inp label='Frequency' value={claim.ahrmFrequency} onChange={v=>up('ahrmFrequency',v)} placeholder='e.g. 2x per week'/></div><div style={css.g2}><Inp label='Duration' value={claim.ahrmDuration} onChange={v=>up('ahrmDuration',v)} placeholder='e.g. 6 weeks'/><Inp label='Sessions requested' value={claim.ahrmSessions} onChange={v=>up('ahrmSessions',v)} placeholder='e.g. 12'/></div><Ta label='Expected outcomes' value={claim.ahrmOutcomes} onChange={v=>up('ahrmOutcomes',v)} placeholder='Expected functional improvements...'/><Ta label='Clinical justification' value={claim.ahrmJustification} onChange={v=>up('ahrmJustification',v)} placeholder='Clinical reasoning...' rows={4}/></div>}
      {sel==='household'&&<div style={css.card}><div style={{fontWeight:700,marginBottom:14}}>Household Help Request</div><div style={css.ok}>✅ Capacity limitations auto-populated from diagnosis screen</div><Ta label='Tasks patient cannot perform' value={claim.hhTasks} onChange={v=>up('hhTasks',v)} placeholder='e.g. Vacuuming, mopping, laundry, grocery shopping...'/><div style={css.g2}><Inp label='Frequency required' value={claim.hhFrequency} onChange={v=>up('hhFrequency',v)} placeholder='e.g. 2x per week'/><Inp label='Duration requested' value={claim.hhDuration} onChange={v=>up('hhDuration',v)} placeholder='e.g. 4 weeks'/></div><Ta label='Clinical justification' value={claim.hhJustification} onChange={v=>up('hhJustification',v)} placeholder='Clinical reasoning...' rows={4}/></div>}
      {sel==='gym_swim'&&<div style={css.card}><div style={{fontWeight:700,marginBottom:14}}>Gym / Swim Membership Request</div><Sel label='Type' value={claim.gymType} onChange={v=>up('gymType',v)} options={['Gym membership','Hydrotherapy / pool access','Gym + hydrotherapy combined']}/><Ta label='Clinical justification' value={claim.gymJustification} onChange={v=>up('gymJustification',v)} placeholder='Why gym/swim is appropriate...'/><Ta label='Recommended program' value={claim.gymProgram} onChange={v=>up('gymProgram',v)} placeholder='e.g. Supervised gym program, aquatic physio...'/><Inp label='Duration requested' value={claim.gymDuration} onChange={v=>up('gymDuration',v)} placeholder='e.g. 3 months'/><Ta label='Expected outcomes' value={claim.gymOutcomes} onChange={v=>up('gymOutcomes',v)} placeholder='Expected improvements...'/></div>}
      {sel==='ps604'&&<div style={css.card}><div style={{fontWeight:700,marginBottom:4}}>PS604 — Psychology Treatment Planning Form</div><div style={{fontSize:'0.76rem',color:'#5B7A99',marginBottom:14}}>Item code PS604 · Fee $203.91 excl. GST · Complete early in treatment</div><Ta label='Psychological diagnosis (DSM-5)' value={claim.ps604Diagnosis} onChange={v=>up('ps604Diagnosis',v)} placeholder='e.g. Adjustment Disorder with Mixed Anxiety and Depressed Mood (309.28)'/><Ta label='Relationship to compensable injury' value={claim.ps604Relationship} onChange={v=>up('ps604Relationship',v)} placeholder='How does the condition relate to the injury...'/><Ta label='Current symptoms' value={claim.ps604Symptoms} onChange={v=>up('ps604Symptoms',v)} placeholder='Current presenting symptoms...' rows={4}/><Ta label='Impact on daily functioning' value={claim.ps604Impact} onChange={v=>up('ps604Impact',v)} placeholder='Impact on work, social, domestic activities...'/><Ta label='Treatment goals' value={claim.ps604Goals} onChange={v=>up('ps604Goals',v)} placeholder='Specific treatment goals...'/><div style={css.g2}><Inp label='Anticipated sessions (3–6 months)' value={claim.ps604Sessions} onChange={v=>up('ps604Sessions',v)} placeholder='e.g. 12–16 sessions'/><Inp label='Frequency' value={claim.ps604Frequency} onChange={v=>up('ps604Frequency',v)} placeholder='e.g. Weekly'/></div><Ta label='Treatment modality & rationale' value={claim.ps604Modality} onChange={v=>up('ps604Modality',v)} placeholder='e.g. CBT, ACT and clinical rationale...'/></div>}
      {sel==='ps109'&&<div style={css.card}><div style={{fontWeight:700,marginBottom:4}}>PS109 — Psychology Treatment Review Form</div><div style={{fontSize:'0.76rem',color:'#5B7A99',marginBottom:14}}>Item code PS109 · Fee $203.91 excl. GST · Complete within first 9 months</div><div style={css.ok}>✅ References PS604 treatment planning data where available</div><Ta label='Treatment progress to date' value={claim.ps109Progress} onChange={v=>up('ps109Progress',v)} placeholder='Progress against PS604 goals...'/><Ta label='Outcome measure results' value={claim.ps109Outcomes} onChange={v=>up('ps109Outcomes',v)} placeholder='DASS-21 scores and comparison to baseline...'/><Ta label='Ongoing barriers' value={claim.ps109Barriers} onChange={v=>up('ps109Barriers',v)} placeholder='Remaining barriers to recovery...'/><Ta label='Revised treatment plan' value={claim.ps109Plan} onChange={v=>up('ps109Plan',v)} placeholder='Updated goals if different from PS604...'/><div style={css.g2}><Inp label='Additional sessions requested' value={claim.ps109Sessions} onChange={v=>up('ps109Sessions',v)} placeholder='e.g. 8 further sessions'/><Inp label='Anticipated end date' value={claim.ps109EndDate} onChange={v=>up('ps109EndDate',v)} type='date'/></div></div>}
    </div>
  );
}

  return(
    <div>
      <div style={{fontWeight:800,fontSize:'1.1rem',marginBottom:4}}>🔄 RTW & Rehabilitation Plan</div>
      <div style={{fontSize:'0.82rem',color:'#5B7A99',marginBottom:20}}>Return to work planning. Complete after all clinical assessments above.</div>
      <div style={css.warn}>📖 RTW timeframes are research-based guidelines for your consideration — clinical judgement applies to each individual patient.</div>
      <div style={css.card}>
        <div style={{fontWeight:700,marginBottom:14}}>RTW assessment</div>
        <div style={css.g2}>
          <Inp label='Estimated RTW — normal duties' value={claim.rtwNormalDate} onChange={v=>up('rtwNormalDate',v)} type='date'/>
          <Inp label='Estimated RTW — modified duties' value={claim.rtwModifiedDate} onChange={v=>up('rtwModifiedDate',v)} type='date'/>
        </div>
        <Ta label='RTW plan / graded return' value={claim.rtwPlan} onChange={v=>up('rtwPlan',v)} placeholder='Graduated return to work approach...' rows={4}/>
        <Ta label='Modified duties recommendations' value={claim.modifiedDuties} onChange={v=>up('modifiedDuties',v)} placeholder='Specific modified duties available...'/>
      </div>
      <div style={css.card}>
        <div style={{fontWeight:700,marginBottom:14}}>Suggested treatment & recovery plan</div>

        <Ta label='Phase 2 — Rehabilitation (Week 4–12)' value={claim.rehabPhase2} onChange={v=>up('rehabPhase2',v)} placeholder='Goals and interventions...'/>
        <Ta label='Phase 3 — Return to work (Week 12+)' value={claim.rehabPhase3} onChange={v=>up('rehabPhase3',v)} placeholder='Goals and work reintegration...'/>
        {/* TOOCS code removed — will be reviewed for NSW expansion */}

function Tab9({claim,up,clinic,practitioners}){
  const[tmpl,setTmpl]=useState('');
  const[letter,setLetter]=useState('');
  const[gen,setGen]=useState(false);
  const TMPLS=[{id:'specialist_opinion',label:'Specialist referral — Opinion'},{id:'specialist_ongoing',label:'Specialist referral — Ongoing management'},{id:'allied_health',label:'Allied health referral'},{id:'psychology',label:'Psychology referral'},{id:'gym_swim',label:'Gym / Swim referral'},{id:'radiology',label:'Radiological imaging referral'},{id:'household',label:'Household / ADL assessment'},{id:'travel',label:'Travel & accommodation request'},{id:'procedure',label:'Procedure / Surgery request'}];
  const refs=claim.referrals||[];
  const prac=practitioners.find(p=>p.id===claim.practitionerId);
  const diags=(claim.diagnoses||[]).map(d=>d.label).join(', ')||'Not specified';
  const firstRef=refs[0]||{};
  const genLetter=async()=>{
    if(!tmpl)return;setGen(true);
    const t=TMPLS.find(x=>x.id===tmpl);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Generate a professional ${claim.scheme||'WorkCover'} referral letter for: "${t.label}".
Patient: ${claim.patientName||'[Patient]'}, DOB: ${claim.dob||'[DOB]'}, Claim: ${claim.claimNumber||'[Claim No]'}, Injury date: ${claim.dateOfInjury||'[Date]'}
Diagnosis: ${diags}
Referring: ${prac?.name||'[Practitioner]'}, ${prac?.profession||''}, Provider: ${prac?.providerNo||'[No]'}, Clinic: ${clinic.name}
Referred to: ${firstRef.name||'[Colleague]'}, ${firstRef.specialty||''}, Priority: ${firstRef.priority||'Routine'}
Fitness for work: ${claim.fitnessForWork||'Not assessed'}
Treatment: ${claim.treatmentPlan||'As per clinical assessment'}
Start with "Dear ${firstRef.name||'Colleague'}," and include: thank you for accepting, patient details, reason for referral, clinical summary, specific request. Close professionally. Australian medical letter format. Include causation/clinical reasoning section. Sign with practitioner details.`}]})});
      const d=await r.json();setLetter(d.content?.[0]?.text||'Error generating letter');
    }catch{setLetter('Unable to generate letter. Please try again.');}
    setGen(false);
  };
  return(
    <div>
      <div style={{fontWeight:800,fontSize:'1.1rem',marginBottom:4}}>📨 Referral & Export</div>
      <div style={{fontSize:'0.82rem',color:'#5B7A99',marginBottom:20}}>Generate professional referral letters. Auto-populated from claim data.</div>
      {refs.length>0&&<div style={css.card}><div style={{fontWeight:700,marginBottom:12}}>Referrals from treatment plan</div>{refs.map(r=><div key={r.id} style={{...css.cardSm,marginBottom:8}}><div style={{fontWeight:600,fontSize:'0.87rem'}}>{r.specialty.replace(' ⚠️ GP referral required','')}</div>{r.name&&<div style={{fontSize:'0.76rem',color:'#5B7A99',marginTop:2}}>{r.name}{r.clinic?' · '+r.clinic:''}{r.email?' · '+r.email:''}</div>}</div>)}</div>}
      <div style={css.card}>
        <div style={{fontWeight:700,marginBottom:14}}>Generate referral letter</div>
        <Sel label='Select letter template' value={tmpl} onChange={setTmpl} options={TMPLS.map(t=>({value:t.id,label:t.label}))}/>
        <button style={css.btnP} onClick={genLetter} disabled={gen||!tmpl}>{gen?'⚡ Generating…':'⚡ Generate letter'}</button>
        {letter&&<div style={{marginTop:20}}>
          <div style={{...css.fb,marginBottom:10}}><div style={{fontWeight:600,fontSize:'0.87rem'}}>Generated letter</div><button style={css.btnS} onClick={()=>{navigator.clipboard.writeText(letter);alert('Copied!');}}>📋 Copy</button></div>
          <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'20px',fontFamily:'Georgia,serif',fontSize:'0.9rem',lineHeight:1.8,whiteSpace:'pre-wrap',color:'rgba(239,246,255,0.9)',maxHeight:480,overflow:'auto'}}>{letter}</div>
          <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
            <button style={{...css.btnP,fontSize:'0.83rem',padding:'9px 16px'}}>📧 Send to practitioner</button>
            <button style={{...css.btnS,fontSize:'0.83rem',padding:'9px 16px'}}>📧 Send to insurer</button>
            <button style={{...css.btnS,fontSize:'0.83rem',padding:'9px 16px'}}>📧 CC patient</button>
          </div>
        </div>}
      </div>
      <div style={css.card}>
        <div style={{fontWeight:700,marginBottom:10}}>Travel & accommodation</div>
        <div style={css.warn}>⚠️ If patient cannot travel to approved consultations due to their compensable injury, state clinical reasoning below.</div>
        <Ta label='Clinical reasoning for funded travel' value={claim.travelReasoning} onChange={v=>up('travelReasoning',v)} placeholder='e.g. Patient unable to travel by private vehicle due to cervical injury preventing safe head rotation...'/>
      </div>
      <div style={css.card}>
        <div style={{fontWeight:700,marginBottom:14}}>Claim summary</div>
        {[['Patient',claim.patientName],['Claim number',claim.claimNumber],['Scheme',claim.scheme],['Insurer',claim.insurerName||claim.insurerNameCustom],['Diagnosis',diags],['Fitness for work',claim.fitnessForWork],['COC valid',claim.cocFrom?(claim.cocFrom+' → '+claim.cocTo):'—'],['Practitioner',claim.practitionerName]].map(([l,v])=><div key={l} style={{fontSize:'0.85rem',lineHeight:2}}><span style={{color:'#5B7A99'}}>{l}:</span> {v||'—'}</div>)}
      </div>
    </div>
  );
}

function App(){
  const[clinic,setClinic]=useState(null);
  const[claims,setClaims]=useState([]);
  const[nav,setNav]=useState('dashboard');
  const[activeClaim,setActiveClaim]=useState(null);
  const[collapsed,setCollapsed]=useState(false);
  useEffect(()=>{sget('session9:current').then(s=>{if(s){setClinic(s.clinic);loadClaims(s.clinic.id);}});},[]);
  const loadClaims=async(cid)=>{const s=await sget('claims9:'+cid)||[];setClaims(s);};
  const handleLogin=async(c)=>{setClinic(c);await sset('session9:current',{clinic:c,loggedInAt:new Date().toISOString()});await loadClaims(c.id);setNav('dashboard');};
  const handleLogout=async()=>{await sdel('session9:current');setClinic(null);setClaims([]);setActiveClaim(null);setNav('dashboard');};
  const handleSave=async(claim)=>{const up=claims.find(c=>c.id===claim.id)?claims.map(c=>c.id===claim.id?claim:c):[...claims,claim];setClaims(up);await sset('claims9:'+clinic.id,up);setActiveClaim(claim);};
  const handleNav=(n)=>{if(n==='new_claim'){setActiveClaim(null);setNav('claim');}else{setNav(n);}};
  const handleOpen=(c)=>{setActiveClaim(c);setNav('claim');};
  const handleBack=()=>{setNav('dashboard');loadClaims(clinic.id);};
  if(!clinic)return <LoginScreen onLogin={handleLogin}/>;
  return(
    <div style={css.appShell}>
      <Sidebar nav={nav==='claim'?'claims':nav} onNav={handleNav} clinic={clinic} onLogout={handleLogout} collapsed={collapsed} onToggle={()=>setCollapsed(!collapsed)}/>
      <div style={css.mainContent}>
        <TopBar clinic={clinic} nav={nav} claim={activeClaim}/>
        {nav==='dashboard'&&<Dashboard clinic={clinic} claims={claims} onNew={()=>{setActiveClaim(null);setNav('claim');}} onOpen={handleOpen}/>}
        {nav==='claims'&&<ClaimsPage claims={claims} onOpen={handleOpen} onNew={()=>{setActiveClaim(null);setNav('claim');}}/>}
        {nav==='claim'&&<ClaimForm clinic={clinic} claimData={activeClaim} onSave={handleSave} onBack={handleBack}/>}
        {nav==='practitioners'&&<PractitionersPage clinic={clinic}/>}
        {nav==='settings'&&<div style={css.page}><div style={{fontWeight:800,fontSize:'1.2rem',marginBottom:20}}>⚙️ Settings</div><div style={css.card}><div style={{fontWeight:700,marginBottom:12}}>Clinic details</div>{[['Name',clinic.name],['Plan',clinic.plan],['ABN',clinic.abn]].map(([l,v])=><div key={l} style={{fontSize:'0.88rem',lineHeight:2}}><span style={{color:'#5B7A99'}}>{l}:</span> {v}</div>)}</div></div>}
        {nav==='help'&&<div style={css.page}><div style={{fontWeight:800,fontSize:'1.2rem',marginBottom:20}}>❓ Help & Support</div><div style={css.card}><div style={{fontWeight:700,marginBottom:14}}>Quick guide</div>{[['1','Select scheme first','Always choose WorkCover or TAC at the top of Patient & Claim — this drives everything.'],['2','Add practitioners','Go to Practitioners in the sidebar to add staff and provider numbers.'],['3','Work through each tab','Complete tabs in order. Use Next at the bottom.'],['4','Save often','Use Save draft to preserve progress. Save claim when complete.'],['5','Generate referral letters','On the Referral & Export tab, select a template and click Generate.']].map(([n,t,d])=><div key={n} style={{display:'flex',gap:14,marginBottom:16}}><div style={{width:28,height:28,borderRadius:'50%',background:'rgba(0,201,167,0.15)',border:'1px solid rgba(0,201,167,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'monospace',fontWeight:700,color:'#00C9A7',fontSize:'0.84rem',flexShrink:0}}>{n}</div><div><div style={{fontWeight:600,fontSize:'0.9rem',marginBottom:3}}>{t}</div><div style={{fontSize:'0.82rem',color:'#5B7A99',lineHeight:1.5}}>{d}</div></div></div>)}</div></div>}
        {nav==='invoicing'&&<div style={css.page}><div style={{fontWeight:800,fontSize:'1.2rem',marginBottom:20}}>🧾 Invoicing</div><div style={{...css.card,textAlign:'center',padding:'40px'}}><div style={{fontSize:'2.5rem',marginBottom:12}}>🧾</div><div style={{fontWeight:600,marginBottom:8}}>Coming soon</div><div style={{fontSize:'0.84rem',color:'#5B7A99'}}>Invoice generation with WorkSafe and TAC item codes will be available in the next update.</div></div></div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
